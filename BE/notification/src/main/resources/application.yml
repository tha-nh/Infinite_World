server:
  port: 8084

spring:
  devtools:
    restart:
      enabled: false
  application:
    name: notification-service

  config:
    import: optional:file:.env.properties

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Mail Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:trungthanhvosong@gmail.com}
    password: ${MAIL_PASSWORD:bbbs emzf spgm kwfv}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Thymeleaf for email templates
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:infinite@123}

# SMS Configuration
sms:
  provider:
    url: ${SMS_PROVIDER_URL:https://api.twilio.com/2010-04-01/Accounts}
    account-sid: ${SMS_ACCOUNT_SID:}
    auth-token: ${SMS_AUTH_TOKEN:}
    from-number: ${SMS_FROM_NUMBER:+1234567890}
  mock:
    mode: ${SMS_MOCK_MODE:true}

# Messaging Configuration
messaging:
  # Provider: kafka, rabbitmq, redis (change this to switch messaging system)
  provider: ${MESSAGING_PROVIDER:kafka}
  
  # Topic names (customize without changing code)
  topics:
    email: ${TOPIC_EMAIL:notification.email}
    sms: ${TOPIC_SMS:notification.sms}
    websocket: ${TOPIC_WEBSOCKET:notification.websocket}
    user-registered: ${TOPIC_USER_REGISTERED:user.registered}
    user-verified: ${TOPIC_USER_VERIFIED:user.verified}
    user-password-reset: ${TOPIC_USER_PASSWORD_RESET:user.password.reset}
    account-verification: ${TOPIC_ACCOUNT_VERIFICATION:account.verification}
    user-status-change: ${TOPIC_USER_STATUS_CHANGE:user.status.change}

# Application Configuration
app:
  base.url: ${APP_BASE_URL:http://localhost:8080}

# Logging
logging:
  level:
    com.infinite.notification: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
