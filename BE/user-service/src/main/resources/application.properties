spring.application.name=user-service
server.port=8081
spring.config.import=optional:file:.env.properties
spring.profiles.active=${SPRING_PROFILES_ACTIVE}
springdoc.api-docs.enabled=${API_DOCS}
springdoc.swagger-ui.enabled=${API_DOCS}
secret.key=${SECRET_KEY}
jwt.expiration.ms=${JWT_EXPIRATION_MS}
#DB
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

spring.jpa.database-platform=${DB_PLATFORM}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${USER_SCHEMA}

#Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

logging.level.root=INFO
logging.level.org.hibernate.orm.jdbc.error=ERROR
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate.orm=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.tomcat=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

#ACTUATOR
management.tracing.sampling.probability=0.1
management.endpoints.web.exposure.include=health,info,metrics

spring.mvc.async.request-timeout=30000
server.tomcat.threads.max=200
server.tomcat.accept-count=100