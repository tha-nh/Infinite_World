server:
  port: 8080

spring:
  application:
    name: gateway

  config:
    import: optional:file:.env.properties

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  main:
    web-application-type: reactive

  cloud:
    gateway:
      enabled: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods, RETAIN_LAST

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedHeaders: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowCredentials: false
            maxAge: 3600

gateway:
  routes:
    - id: authen
      uri: ${USER_SERVICE}
      predicates:
        - Path=/v1/api/auth/**
        - Method=GET,POST,PUT,DELETE,OPTIONS
      filters:
        - Authorization=publish

    - id: user
      uri: ${USER_SERVICE}
      predicates:
        - Path=/v1/api/user/**
        - Method=GET,POST,PUT,DELETE,OPTIONS
      filters:
        - Authorization=authn

    - id: admin
      uri: ${USER_SERVICE}
      predicates:
        - Path=/v1/api/admin/**
        - Method=GET,POST,PUT,DELETE,OPTIONS
      filters:
        - Authorization=authz
        - Role=ADMIN

