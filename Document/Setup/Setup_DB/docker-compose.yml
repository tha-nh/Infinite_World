services:
  postgres:
    image: postgres:17.4
    container_name: postgres-db
    # restart: always
    environment:
      POSTGRES_DB: infinite_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.0.0
    container_name: redis-db
    # restart: always
    ports:
      - "6379:6379"
    command: >
      sh -c "redis-server --appendonly yes --requirepass 123456"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: