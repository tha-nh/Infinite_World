spring.application.name=file-service
server.port=8083
spring.config.import=optional:file:.env.properties
spring.profiles.active=${SPRING_PROFILES_ACTIVE}
springdoc.api-docs.enabled=${API_DOCS}
springdoc.swagger-ui.enabled=${API_DOCS}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/infinite_world}
spring.datasource.username=${DB_USERNAME:infinite}
spring.datasource.password=${DB_PASSWORD:infinite@123}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA Configuration
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${FILE_SCHEMA:INF_FILE}
spring.jpa.open-in-view=false

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Servlet multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

# Redis Configuration (for i18n messages)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:infinite@123}

# i18n Configuration
i18n.cache-prefix=i18n:

# File Upload Configuration
file.upload.max-size=52428800
file.upload.allowed-types=jpg,jpeg,png,gif,bmp,webp,svg,ico,mp4,avi,mov,wmv,flv,mkv,webm,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,csv,zip,rar,7z

# File size limits by category (in bytes)
file.upload.max-size.images=10485760
file.upload.max-size.avatar=5242880
file.upload.max-size.videos=104857600
file.upload.max-size.documents=20971520
file.upload.max-size.archives=52428800
file.upload.max-size.default=52428800

# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=${MINIO_BUCKET_NAME:infinite-world}

# File URL Configuration
file.public.base-url=${FILE_PUBLIC_BASE_URL:http://localhost:9000}

# Performance Optimization
server.tomcat.threads.max=200
server.tomcat.accept-count=100
spring.mvc.async.request-timeout=30000

# Connection Pool for MinIO
minio.connection-pool.max-connections=50
minio.connection-pool.connection-timeout=5000
minio.connection-pool.read-timeout=10000

logging.level.root=INFO
logging.level.com.infinite.file=INFO
logging.level.io.minio=WARN

# gRPC Configuration
grpc.server.port=${GRPC_FILE_SERVICE_PORT:18083}
grpc.server.address=0.0.0.0
grpc.server.reflection-service-enabled=true
grpc.server.max-inbound-message-size=104857600
grpc.server.max-inbound-metadata-size=8192

# Resource Type Configuration
file.resource.types.image=jpg,jpeg,png,gif,bmp,webp,svg,ico
file.resource.types.video=mp4,avi,mov,wmv,flv,mkv,webm
file.resource.types.document=pdf,doc,docx,xls,xlsx,ppt,pptx,txt,csv
file.resource.types.archive=zip,rar,7z

spring.devtools.restart.enabled=false