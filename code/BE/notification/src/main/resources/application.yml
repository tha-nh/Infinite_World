server:
  port: 8084

spring:
  devtools:
    restart:
      enabled: false
  application:
    name: notification-service

  config:
    import: optional:file:.env.properties

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/infinite_world}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ${NOTI_SCHEMA:INF_NOTI}
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        format_sql: false
        show_sql: false
    show-sql: false

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Mail Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:trungthanhvosong@gmail.com}
    password: ${MAIL_PASSWORD:bbbs emzf spgm kwfv}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Thymeleaf for email templates
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:infinite@123}

# Messaging Configuration
messaging:
  # Provider: kafka, rabbitmq, redis (change this to switch messaging system)
  provider: ${MESSAGING_PROVIDER:kafka}
  
  # Topic names (customize without changing code)
  topics:
    notification-request: ${TOPIC_NOTIFICATION_REQUEST:notification.request.v1}
    notification-delivery-requested: ${TOPIC_NOTIFICATION_DELIVERY_REQUESTED:notification.delivery.requested}
    notification-delivery-batch-requested: ${TOPIC_NOTIFICATION_DELIVERY_BATCH_REQUESTED:notification.delivery.batch.requested}
    notification-dlq: ${TOPIC_NOTIFICATION_DLQ:notification.dlq}
    email: ${TOPIC_EMAIL:notification.email}
    websocket: ${TOPIC_WEBSOCKET:notification.websocket}
    user-registered: ${TOPIC_USER_REGISTERED:user.registered}
    user-verified: ${TOPIC_USER_VERIFIED:user.verified}
    user-password-reset: ${TOPIC_USER_PASSWORD_RESET:user.password.reset}
    account-verification: ${TOPIC_ACCOUNT_VERIFICATION:account.verification}
    user-status-change: ${TOPIC_USER_STATUS_CHANGE:user.status.change}

# Application Configuration
app:
  base.url: ${APP_BASE_URL:http://localhost:8080}

notification:
  fanout:
    batch-size: ${NOTIFICATION_FANOUT_BATCH_SIZE:500}
    max-retry: ${NOTIFICATION_FANOUT_MAX_RETRY:3}
  retention:
    inbox-days: ${NOTIFICATION_RETENTION_INBOX_DAYS:180}
    email-log-days: ${NOTIFICATION_RETENTION_EMAIL_LOG_DAYS:90}
    delivery-days: ${NOTIFICATION_RETENTION_DELIVERY_DAYS:90}
  cleanup:
    enabled: ${NOTIFICATION_CLEANUP_ENABLED:true}
    cron: ${NOTIFICATION_CLEANUP_CRON:0 30 2 * * *}

# Logging
logging:
  level:
    com.infinite.notification: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
