spring.application.name=user-service
server.port=8081
spring.config.import=optional:file:.env.properties

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

# Active profiles: dev,kafka (kafka profile is REQUIRED for notifications)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev,kafka}
springdoc.api-docs.enabled=${API_DOCS:true}
springdoc.swagger-ui.enabled=${API_DOCS:true}
secret.key=${SECRET_KEY:infinite_world_super_secure_key_2026_dev}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}
app.base.url=${APP_BASE_URL:http://localhost:8080}

#DB
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/infinite_world}
spring.datasource.username=${DB_USERNAME:infinite}
spring.datasource.password=${DB_PASSWORD:infinite@123}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.jpa.properties.hibernate.default_schema=${USER_SCHEMA:INF_USER}

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:infinite@123}
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

# File Upload Configuration
file.upload.max-size=52428800
file.upload.allowed-types=jpg,jpeg,png,gif,mp4,avi,mov,pdf,doc,docx,xls,xlsx,ppt,pptx,txt

# File Service URL
file.service.url=${FILE_SERVICE:http://localhost:8083}

# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=${MINIO_BUCKET_NAME:infinite-world}

# File URL Configuration
file.public.base-url=${FILE_PUBLIC_BASE_URL:http://localhost:9000}

logging.level.root=INFO
logging.level.org.hibernate.orm.jdbc.error=ERROR
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate.orm=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.tomcat=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

#ACTUATOR
management.tracing.sampling.probability=0.1
management.endpoints.web.exposure.include=health,info,metrics

spring.mvc.async.request-timeout=30000
server.tomcat.threads.max=200
server.tomcat.accept-count=100

grpc.server.port=${GRPC_USER_SERVICE_PORT}

spring.devtools.restart.enabled=false
logging.level.org.springframework.boot.env=DEBUG
logging.level.org.springframework.cloud.config=DEBUG
